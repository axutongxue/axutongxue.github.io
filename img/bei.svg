<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="24" height="24">
  <!-- 移动的虚线边框 -->
  <rect x="10" y="10" width="180" height="180" rx="8" fill="none" stroke="black" stroke-width="6" stroke-dasharray="10 10">
    <animate attributeName="stroke-dashoffset" values="0; 20" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- ================= 第一部分：点此查看 ================= -->
  <g font-family="sans-serif" font-size="72" fill="black" text-anchor="middle" dominant-baseline="middle">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.0625;0.4375;0.5;1" dur="8s" repeatCount="indefinite" />
    
    <text x="55" y="65">点</text>
    <text x="145" y="65">此</text>
    <text x="55" y="145">查</text>
    <text x="145" y="145">看</text>
  </g>

  <!-- ================= 第二部分：备用链接 ================= -->
  <g font-family="sans-serif" font-size="72" fill="black" text-anchor="middle" dominant-baseline="middle">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.5625;0.9375;1" dur="8s" repeatCount="indefinite" />
    
    <text x="55" y="65">备</text>
    <text x="145" y="65">用</text>
    <text x="55" y="145">链</text>
    <text x="145" y="145">接</text>
  </g>
</svg>